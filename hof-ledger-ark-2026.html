<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>&#20449;&#20208;&#38712;&#27402;&#21344;&#21340;&#32113;&#35336;</title>
  <link rel="stylesheet" href="styles.css?v=20260629-card-art">
</head>
<body>
  <main class="app-shell stats-shell">
    <section class="reading-panel">
      <div class="title-block">
        <p class="eyebrow">Private Ledger</p>
        <h1>&#21344;&#21340;&#32113;&#35336;</h1>
      </div>
      <div class="control-grid">
        <label class="field full">
          <span>&#31649;&#29702; Token</span>
          <input id="stats-token" type="password" placeholder="&#36664;&#20837;&#31649;&#29702; token">
        </label>
        <div class="action-row full">
          <button class="primary-button" id="load-stats-button" type="button">&#35712;&#21462;&#32113;&#35336;</button>
        </div>
        <div class="field full">
          <span>&#32113;&#35336;&#31684;&#22285;</span>
          <div class="topic-row" id="period-buttons" role="group" aria-label="&#32113;&#35336;&#31684;&#22285;">
            <button type="button" class="topic-button active" data-period="24h">24 &#23567;&#26178;</button>
            <button type="button" class="topic-button" data-period="today">&#20170;&#26085;</button>
            <button type="button" class="topic-button" data-period="7d">7 &#22825;</button>
            <button type="button" class="topic-button" data-period="all">&#32317;&#39636;</button>
          </div>
        </div>
      </div>
    </section>

    <section class="result-area" id="stats-output">
      <div class="empty-state">
        <div class="empty-card">#</div>
        <p>&#36889;&#26159;&#31169;&#20154;&#32113;&#35336;&#38913;&#12290;&#35531;&#36664;&#20837;&#31649;&#29702; token&#65292;&#20877;&#35712;&#21462;&#36039;&#26009;&#12290;</p>
      </div>
    </section>
  </main>

  <script src="stats-config.js?v=20260629-cloudflare-stats"></script>
  <script>
    const output = document.querySelector("#stats-output");
    const tokenInput = document.querySelector("#stats-token");
    const button = document.querySelector("#load-stats-button");
    const periodButtons = document.querySelectorAll("#period-buttons .topic-button");
    const config = window.HOF_STATS_CONFIG || {};
    let currentPeriod = "24h";

    const params = new URLSearchParams(location.search);
    tokenInput.value = params.get("token") || window.localStorage.getItem("hof_stats_admin_token") || config.adminToken || "";

    const eventLabels = {
      page_view: "\u9801\u9762\u700f\u89bd",
      draw_mode_changed: "\u5207\u63db\u62bd\u724c\u65b9\u5f0f",
      topic_selected: "\u9078\u64c7\u984c\u578b",
      question_generated: "\u7522\u751f\u5e38\u898b\u554f\u984c",
      reading_drawn: "\u5b8c\u6210\u62bd\u724c",
      prompt_copied: "\u8907\u88fd AI Prompt",
      reading_reset: "\u91cd\u65b0\u7b97\u724c",
      reading_error: "\u62bd\u724c\u932f\u8aa4",
      language_changed: "\u5207\u63db\u8a9e\u8a00"
    };

    const languageLabels = {
      zh: "\u4e2d\u6587",
      en: "\u82f1\u6587",
      unknown: "\u672a\u77e5"
    };

    const topicLabels = {
      general: "\u6574\u9ad4\u72c0\u6cc1",
      love: "\u611f\u60c5\u95dc\u4fc2",
      career: "\u5de5\u4f5c\u4e8b\u696d",
      decision: "\u9078\u64c7\u6c7a\u7b56",
      money: "\u91d1\u9322\u8cc7\u6e90",
      self: "\u81ea\u6211\u72c0\u614b",
      custom: "\u81ea\u8a02\u8b70\u984c",
      unknown: "\u672a\u77e5"
    };


    const outboundTargetLabels = {
      facebook: "Facebook \u7c89\u5c08",
      instagram: "Instagram",
      bgg: "BoardGameGeek",
      buy_uk: "UK \u8cfc\u8cb7\u9801",
      buy_international: "\u5176\u4ed6\u5730\u5340\u8cfc\u8cb7\u9801",
      about_game: "\u4fe1\u4ef0\u9738\u6b0a\u662f\u4ec0\u9ebc",
      unknown: "\u672a\u77e5"
    };

    const periodLabels = {
      "24h": "\u6700\u8fd1 24 \u5c0f\u6642",
      today: "\u4eca\u65e5",
      "7d": "\u6700\u8fd1 7 \u5929",
      all: "\u7e3d\u9ad4"
    };

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function labelFrom(map, value) {
      const key = String(value || "unknown");
      return map[key] || key || map.unknown || "\u672a\u77e5";
    }


    function detailTargetLabel(value) {
      if (!value) return "";
      try {
        const data = typeof value === "string" ? JSON.parse(value) : value;
        return labelFrom(outboundTargetLabels, data.target);
      } catch {
        return value;
      }
    }

    function renderMetric(label, value) {
      return `<article class="stat-card"><span>${escapeHtml(label)}</span><strong>${escapeHtml(value || 0)}</strong></article>`;
    }

    function formatCell(row, column) {
      const value = row[column.key];
      if (column.format) return column.format(value, row);
      return value;
    }

    function renderTable(title, rows, columns) {
      if (!rows || rows.length === 0) {
        return `<section class="reading-summary"><h2>${escapeHtml(title)}</h2><p class="summary-text">\u76ee\u524d\u6c92\u6709\u8cc7\u6599\u3002</p></section>`;
      }
      return `
        <section class="reading-summary">
          <h2>${escapeHtml(title)}</h2>
          <div class="stats-table-wrap">
            <table class="stats-table">
              <thead><tr>${columns.map((column) => `<th>${escapeHtml(column.label)}</th>`).join("")}</tr></thead>
              <tbody>
                ${rows.map((row) => `<tr>${columns.map((column) => `<td>${escapeHtml(formatCell(row, column))}</td>`).join("")}</tr>`).join("")}
              </tbody>
            </table>
          </div>
        </section>
      `;
    }

    function renderStats(data) {
      const totals = data.totals || {};
      output.innerHTML = `
        <section class="question-summary">
          <p class="section-label">\u76ee\u524d\u7bc4\u570d</p>
          <p class="question-line">${escapeHtml(periodLabels[data.period] || data.periodLabel || currentPeriod)}</p>
          <p class="topic-line">\u6700\u5f8c\u66f4\u65b0\uff1a${escapeHtml(new Date().toLocaleString())}</p>
        </section>
        <section class="stats-grid">
          ${renderMetric("\u4f7f\u7528\u4eba\u6578", data.uniqueSessions)}
          ${renderMetric("\u5b8c\u6210\u62bd\u724c", totals.reading_drawn)}
          ${renderMetric("\u8907\u88fd AI Prompt", totals.prompt_copied)}
          ${renderMetric("\u9ede\u4ecb\u7d39\u9801\u9023\u7d50", totals.about_link_clicked)}
          ${renderMetric("\u4ecb\u7d39\u9801\u700f\u89bd", totals.about_page_view)}
          ${renderMetric("\u5c0e\u6d41\u9023\u7d50\u9ede\u64ca", totals.outbound_clicked)}
        </section>
        ${renderTable("\u8a9e\u8a00\u5206\u5e03\uff08\u5b8c\u6210\u62bd\u724c\uff09", data.byLanguage, [
          { key: "key", label: "\u8a9e\u8a00", format: (value) => labelFrom(languageLabels, value) },
          { key: "count", label: "\u6b21\u6578" }
        ])}
        ${renderTable("\u984c\u578b\u5206\u5e03\uff08\u5b8c\u6210\u62bd\u724c\uff09", data.byTopic, [
          { key: "key", label: "\u984c\u578b", format: (value) => labelFrom(topicLabels, value) },
          { key: "count", label: "\u6b21\u6578" }
        ])}
        ${renderTable("\u570b\u5bb6/\u5730\u5340\u5206\u5e03\uff08\u5b8c\u6210\u62bd\u724c\uff09", data.byCountry, [
          { key: "key", label: "\u570b\u5bb6/\u5730\u5340" },
          { key: "count", label: "\u6b21\u6578" }
        ])}
        ${renderTable("\u5c0e\u6d41\u9ede\u64ca\u7d71\u8a08", data.byConversionTarget, [
          { key: "key", label: "\u9023\u7d50", format: (value) => detailTargetLabel(value) },
          { key: "count", label: "\u6b21\u6578" }
        ])}
        ${renderTable("\u6700\u8fd1\u4e8b\u4ef6", data.recent, [
          { key: "timestamp", label: "\u6642\u9593" },
          { key: "eventName", label: "\u4e8b\u4ef6", format: (value) => labelFrom(eventLabels, value) },
          { key: "language", label: "\u8a9e\u8a00", format: (value) => labelFrom(languageLabels, value) },
          { key: "questionType", label: "\u984c\u578b", format: (value) => labelFrom(topicLabels, value) },
          { key: "country", label: "\u570b\u5bb6/\u5730\u5340" }
        ])}
      `;
    }

    async function loadStats() {
      if (!config.endpoint) {
        output.innerHTML = `<div class="empty-state"><div class="empty-card">!</div><p>\u5c1a\u672a\u8a2d\u5b9a stats-config.js \u7684 endpoint\u3002</p></div>`;
        return;
      }
      const token = tokenInput.value.trim();
      window.localStorage.setItem("hof_stats_admin_token", token);
      output.innerHTML = `<div class="empty-state"><div class="empty-card">...</div><p>\u8b80\u53d6\u4e2d...</p></div>`;
      const url = `${config.endpoint}?mode=summary&period=${encodeURIComponent(currentPeriod)}&token=${encodeURIComponent(token)}`;
      try {
        const response = await fetch(url);
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        renderStats(await response.json());
      } catch (error) {
        output.innerHTML = `<div class="empty-state"><div class="empty-card">!</div><p>\u8b80\u53d6\u5931\u6557\uff1a${escapeHtml(error.message)}</p></div>`;
      }
    }

    button.addEventListener("click", loadStats);
    periodButtons.forEach((periodButton) => {
      periodButton.addEventListener("click", () => {
        currentPeriod = periodButton.dataset.period || "24h";
        periodButtons.forEach((item) => {
          const active = item === periodButton;
          item.classList.toggle("active", active);
          item.setAttribute("aria-pressed", active ? "true" : "false");
        });
        loadStats();
      });
    });
  </script>
</body>
</html>
